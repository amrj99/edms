name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  # ─── المرحلة 1: التحقق من جودة الكود ────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build lib/db
        run: tsc --build lib/db

      - name: Validate migration journal
        run: bash scripts/check-migration-journal.sh

      - name: Build — API
        run: pnpm --filter api-server build

      - name: Build — Frontend
        run: pnpm --filter edms build

  # ─── المرحلة 1b: Integration Tests ──────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edms_test
          POSTGRES_USER: edms_test
          POSTGRES_PASSWORD: edms_test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U edms_test -d edms_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      TEST_DATABASE_URL: postgresql://edms_test:edms_test_password@localhost:5433/edms_test
      JWT_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      LOG_LEVEL: silent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build lib/db
        run: tsc --build lib/db

      - name: Run integration tests
        run: pnpm --filter api-server test

  # ─── المرحلة 2: النشر على Staging ────────────────────────────────────────────
  # تعمل فقط لو نجحت المرحلتان الأولى والاختبارات كاملاً.
  deploy:
    name: Deploy to Staging VPS
    runs-on: ubuntu-latest
    needs: [validate, test]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/edms-staging

            echo "── [1/4] سحب آخر تحديث من GitHub ──"
            git pull

            echo "── [2/4] إعادة بناء API ──"
            docker compose -f docker-compose.staging.yml build --no-cache api

            echo "── [3/4] إعادة تشغيل API ──"
            docker compose -f docker-compose.staging.yml up -d --force-recreate api

            echo "── [4/4] التحقق من صحة النظام ──"
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:8081/api/health > /dev/null 2>&1; then
                echo "✅ Staging يعمل بشكل صحيح (attempt $i)"
                exit 0
              fi
              echo "⏳ في الانتظار... ($i/12)"
            done
            echo "❌ Staging لا يستجيب بعد 60 ثانية — يرجى المراجعة"
            exit 1
