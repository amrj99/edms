name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/edms

            echo "── [1/4] سحب آخر تحديث من GitHub ──"
            git pull

            echo "── [2/4] إعادة بناء API ──"
            docker compose build --no-cache api

            echo "── [3/4] إعادة تشغيل API ──"
            docker compose up -d --force-recreate api

            echo "── [4/4] التحقق من صحة النظام ──"
            sleep 15
            curl -sf http://localhost:8080/api/health && echo "✅ النظام يعمل" || echo "❌ النظام لا يستجيب"
