name: Deploy to Production

# validate + test run on PRs to main AND pushes to main.
# The deploy job runs ONLY on a real push to main (never on PRs) — so a feature
# branch gets full CI feedback via its PR without ever touching production.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── المرحلة 1: التحقق من جودة الكود ────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build lib/db (generates type declarations for api-server)
        run: tsc --build lib/db

      # ── Migration Journal Validation ────────────────────────────────────────
      - name: Validate migration journal
        run: bash scripts/check-migration-journal.sh

      # ── TypeScript Check (hard gate) ────────────────────────────────────────
      - name: TypeScript Check
        run: pnpm --filter api-server typecheck

      - name: Build — API
        run: pnpm --filter api-server build

      - name: Build — Frontend
        run: pnpm --filter edms build

  # ─── المرحلة 1b: Integration Tests ──────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edms_test
          POSTGRES_USER: edms_test
          POSTGRES_PASSWORD: edms_test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U edms_test -d edms_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      TEST_DATABASE_URL: postgresql://edms_test:edms_test_password@localhost:5433/edms_test
      JWT_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      LOG_LEVEL: silent
      # ── Storage: mirror production (VPS runs on-premise). Without this the
      # upload path falls through to cloud auto-detection and content-hash tests
      # 500 in CI. Defense-in-depth alongside the hermetic per-org config in the
      # test itself; keeps CI parity with the docker-compose production default.
      DEFAULT_STORAGE_TYPE: onpremise
      DEFAULT_STORAGE_PATH: /tmp/edms-test-uploads

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build lib/db
        run: tsc --build lib/db

      - name: Prepare storage dir
        run: mkdir -p /tmp/edms-test-uploads

      - name: Run integration tests
        run: pnpm --filter api-server test

      - name: Run frontend tests
        run: pnpm --filter edms test

  # ─── المرحلة 2: النشر على السيرفر ────────────────────────────────────────────
  # يعمل فقط على push فعلي إلى main — لا يعمل أبداً على Pull Requests.
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [validate, test]
    # Runs only on a real push to main (never on PRs). A commit whose message
    # contains "[skip deploy]" is held back from production deployment on purpose
    # (validate/test still run) — used to land code on main without deploying yet.
    # Default is unchanged: any push without the marker deploys normally.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip deploy]')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: "20m"
          script: |
            set -e
            cd /var/www/edms

            echo "── [1/7] نسخة احتياطية قبل التحديث ──"
            bash scripts/backup.sh

            echo "── [2/7] حفظ نقطة الرجوع الحالية ──"
            PREV=$(git rev-parse HEAD)
            echo "PREV commit = $PREV"

            echo "── [3/7] سحب آخر تحديث (fast-forward only) ──"
            git fetch origin main
            git pull --ff-only origin main
            TARGET=$(git rev-parse HEAD)
            echo "TARGET commit = $TARGET"

            echo "── [4/7] إعادة بناء API + Frontend ──"
            docker compose build --no-cache api frontend

            echo "── [5/7] إعادة تشغيل الخدمات (migrate يعمل عند إقلاع api) ──"
            docker compose up -d --force-recreate api frontend

            echo "── [6/7] التحقق من الصحة + مطابقة الـ commit ──"
            OK=0
            for i in $(seq 1 12); do
              sleep 5
              health=$(curl -s http://localhost:8080/api/health 2>/dev/null || true)
              echo "⏳ health ($i/12): $health"
              if echo "$health" | grep -q '"status":"ok"'; then OK=1; break; fi
            done
            RUNNING=$(git rev-parse HEAD)
            if [ "$OK" != "1" ] || [ "$RUNNING" != "$TARGET" ]; then
              echo "❌ فشل التحقق — health=$OK running=$RUNNING target=$TARGET"
              echo "── [ROLLBACK] الرجوع إلى $PREV ──"
              git reset --hard "$PREV"
              docker compose build --no-cache api frontend
              docker compose up -d --force-recreate api frontend
              echo "↩️  تم الرجوع إلى النسخة السابقة."
              exit 1
            fi

            echo "── [7/7] Smoke tests ──"
            SMOKE_FAIL=0
            for ep in /api/health; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080$ep")
              echo "smoke $ep => $code"
              [ "$code" = "200" ] || SMOKE_FAIL=1
            done
            # endpoints تتطلب مصادقة يجب أن تعيد 401 (لا 500) دون توكن
            for ep in /api/projects /api/dashboard; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080$ep")
              echo "smoke $ep (no auth) => $code"
              [ "$code" = "401" ] || SMOKE_FAIL=1
            done
            if [ "$SMOKE_FAIL" != "0" ]; then
              echo "❌ Smoke tests فشلت — ROLLBACK إلى $PREV"
              git reset --hard "$PREV"
              docker compose build --no-cache api frontend
              docker compose up -d --force-recreate api frontend
              exit 1
            fi

            echo "✅ النشر ناجح ومُتحقَّق: $TARGET"
