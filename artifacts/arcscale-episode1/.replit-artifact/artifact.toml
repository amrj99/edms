kind = "video"
previewPath = "/arcscale-episode1/"
title = "ArcScale EDMS — الحلقة الأولى"
version = "1.0.0"
id = "artifacts/arcscale-episode1"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/arcscale-episode1/" ]
localPort = 18866

[services.development]
run = "pnpm --filter @workspace/arcscale-episode1 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arcscale-episode1", "run", "build" ]
publicDir = "artifacts/arcscale-episode1/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18866"
BASE_PATH = "/arcscale-episode1/"
