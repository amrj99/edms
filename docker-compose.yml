version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: edms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edms
      POSTGRES_USER: edms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edms -d edms"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: edms_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://edms:${POSTGRES_PASSWORD:-edms_dev_password}@postgres:5432/edms
      JWT_SECRET: ${JWT_SECRET:-edms-secret-key-change-in-production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-edms-refresh-key-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # ── AI (OpenRouter) ─────────────────────────────────────────────────────
      # Required for Document AI Analysis. Get a free key at openrouter.ai/keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # ── Email (Resend) ──────────────────────────────────────────────────────
      # Set RESEND_API_KEY in your .env — without it all emails are silently skipped.
      # FROM_EMAIL must match a verified domain in your Resend dashboard.
      # APP_URL is used in email links — set to your public HTTPS domain.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_NAME: ${FROM_NAME:-ArcScale EDMS}
      APP_URL: ${APP_URL:-}
      # ── Default storage for self-hosted VPS deployments ─────────────────────
      # Override per-org via Admin → Storage settings.
      # Change DEFAULT_STORAGE_TYPE to "s3" and set S3_* vars to use MinIO / S3.
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-onpremise}
      DEFAULT_STORAGE_PATH: ${DEFAULT_STORAGE_PATH:-/app/uploads}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: edms_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
