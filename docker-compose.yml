services:
  postgres:
    image: postgres:16-alpine
    container_name: edms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edms
      POSTGRES_USER: edms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO host port mapping — PostgreSQL is intentionally internal-only.
    # The api container reaches it via Docker DNS (hostname "postgres") on the
    # internal Compose network. Binding 5432 on the host exposes the database
    # to the public internet; never do this in production.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edms -d edms"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: edms_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    # Inject all variables from .env into the container.
    # Keys explicitly listed in `environment:` below always take precedence
    # over anything in .env, so there is no conflict.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      # Reads DATABASE_URL from .env first; falls back to the internal postgres
      # container using the dev default password. In production, set DATABASE_URL
      # in your .env file — that value always takes precedence over this fallback.
      DATABASE_URL: ${DATABASE_URL:-postgresql://edms:edms_dev_password@postgres:5432/edms}
      JWT_SECRET: ${JWT_SECRET:-edms-secret-key-change-in-production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-edms-refresh-key-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # ── AI (OpenRouter) ─────────────────────────────────────────────────────
      # Required for Document AI Analysis. Get a free key at openrouter.ai/keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # ── Email (Resend) ──────────────────────────────────────────────────────
      # Set RESEND_API_KEY in your .env — without it all emails are silently skipped.
      # FROM_EMAIL must match a verified domain in your Resend dashboard.
      # APP_URL is used in email links — set to your public HTTPS domain.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_NAME: ${FROM_NAME:-ArcScale EDMS}
      APP_URL: ${APP_URL:-}
      # ── Default storage for self-hosted VPS deployments ─────────────────────
      # Override per-org via Admin → Storage settings.
      # Set DEFAULT_STORAGE_TYPE in .env to change the fallback (e.g. "r2", "s3").
      # All R2/S3 credentials are read from .env via env_file above — no changes
      # to this file are needed for storage configuration.
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-onpremise}
      DEFAULT_STORAGE_PATH: ${DEFAULT_STORAGE_PATH:-/app/uploads}
      # ── Upload size limit ────────────────────────────────────────────────────
      # Maximum file upload size in MB. Default: 1024 (1 GB).
      # Must match (or be lower than) client_max_body_size in nginx.conf.
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: edms_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
