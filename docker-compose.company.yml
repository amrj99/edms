# docker-compose.company.yml
# Company edition — uses the existing production postgres container.
# Run with: docker compose -p edms-company -f docker-compose.company.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: edms-company_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8090}:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_NAME: ${FROM_NAME:-ArcScale EDMS}
      APP_URL: ${APP_URL:-}
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-onpremise}
      DEFAULT_STORAGE_PATH: ${DEFAULT_STORAGE_PATH:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
    volumes:
      - uploads_data_company:/app/uploads
    networks:
      - edms_default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: edms-company_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - edms_default

volumes:
  uploads_data_company:

networks:
  edms_default:
    external: true
