# =============================================================================
# ArcScale EDMS — Nginx configuration
# Canonical: https://www.arcscale.org  (www is the canonical host)
# Non-www (arcscale.org) redirects to www.
# SSL is terminated by Cloudflare; Nginx listens on port 80 only.
# =============================================================================

# ── Redirect non-www → www (canonical) ───────────────────────────────────────
# Cloudflare proxies both arcscale.org and www.arcscale.org to this server.
# We normalise to www so that the page origin and all /api/ iframe URLs share
# the exact same origin — preventing X-Frame-Options SAMEORIGIN mismatches.
server {
    listen 80;
    server_name arcscale.org;

    # 301 permanent redirect to the canonical www host.
    # $http_x_forwarded_proto is set by Cloudflare (https in production).
    return 301 https://www.arcscale.org$request_uri;
}

# ── Main application server ───────────────────────────────────────────────────
server {
    listen 80;
    server_name www.arcscale.org _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ──────────────────────────────────────────────────────
    # X-Frame-Options is intentionally NOT set here.
    # Reason: Express/Helmet sets it globally (DENY) and explicitly removes it
    # for file-serving routes (/api/storage/objects/*, /api/storage/onpremise/*)
    # so those files can be previewed inside iframes on the same origin.
    # If Nginx adds X-Frame-Options here it overrides Express's per-route
    # removal, causing Chrome to block inline PDF/image previews.
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── File-serving routes — no X-Frame-Options (must be before /api/ block) ──
    # These routes serve PDFs and images embedded in <iframe> elements.
    # proxy_hide_header strips any X-Frame-Options that Express sends before
    # Nginx forwards the response to the browser — the final safety net after
    # the app-level setHeader override and router-level allowIframe middleware.
    location ~ ^/api/storage/(objects|onpremise)/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── index.html — never cached so users always get the latest JS bundle ────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        try_files $uri /index.html;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        try_files $uri $uri/ /index.html;
    }

    # ── Hashed static assets — cached long-term (Vite content-hash filenames) -
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
